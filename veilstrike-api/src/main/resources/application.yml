spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/veilstrike}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 10

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000    # 15 minutes
    refresh-token-expiration: 604800000 # 7 days
  oauth2:
    # Where the backend redirects after a successful Google login, handing the
    # frontend the freshly minted JWT pair. Point this at your PWA's callback route.
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
